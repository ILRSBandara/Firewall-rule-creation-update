---
- name: Firewall Rule Change
  hosts: web
  become: yes

  tasks:
    - name: Install firewalld
      yum:
        name: firewalld
        state: present

    - name: Start firewalld
      service:
        name: firewalld
        state: started
        enabled: yes

    - name: Open port 8080
      firewalld:
        port: 8080/tcp
        permanent: yes
        state: enabled
        immediate: yes
